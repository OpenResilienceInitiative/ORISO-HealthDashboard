name: CI - Feature Branch

on:
  push:
    branches-ignore:
    - main
    - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Validate Node service
      uses: ./.github/actions/node-validate
      with:
        node_version: '18'
